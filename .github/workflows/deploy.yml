name: Auto Update + Deploy NixOS

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6 AM UTC
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout flake with PAT
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Nix
        uses: cachix/install-nix-action@v25

      - name: Update flake.lock
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          nix flake update
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add flake.lock
          git commit -m "auto: flake.lock update $(date -I)" || echo "No changes to commit"

          git config --unset credential.helper || true
          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}
          git push origin HEAD:${{ github.ref_name }}

      - name: Wake and Deploy via VPS
        env:
          VPS_DEPLOY_KEY: ${{ secrets.VPS_DEPLOY_KEY }}
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          NIXOS_USER: ${{ vars.NIXOS_USER }}
          NIXOS_TAIL_IP: ${{ vars.NIXOS_TAIL_IP }}
          NIXOS_MAC_ADDR: ${{ vars.NIXOS_MAC_ADDR }}
          FLAKE_HOSTNAME: ${{ vars.FLAKE_HOSTNAME }}
        run: |
          echo "$VPS_DEPLOY_KEY" > key.pem
          chmod 600 key.pem

          ssh -o StrictHostKeyChecking=no -i key.pem $VPS_USER@$VPS_HOST <<EOF
            echo "Waking up NixOS machine..."
            python -c "
              import socket
              mac = bytes.fromhex('${NIXOS_MAC_ADDR//:/}')
              s = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
              s.setsockopt(socket.SOL_SOCKET, socket.SO_BROADCAST, 1)
              s.sendto(b'\xff'*6 + mac*16, ('255.255.255.255', 9))
              "
            sleep 90
            ssh $NIXOS_USER@$NIXOS_TAIL_IP bash -c '
              set -e
              cd /etc/nixos &&
              git pull &&
              echo "Running nixos-rebuild test..." &&
              sudo nixos-rebuild test --flake .#$FLAKE_HOSTNAME &&
              echo "Test succeeded. Applying switch..." &&
              sudo nixos-rebuild switch --flake .#$FLAKE_HOSTNAME
            '
          EOF
