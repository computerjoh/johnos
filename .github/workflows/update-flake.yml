name: Update flake.lock

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/update-flake-lock@main
        with:
          pr-title: "chore: flake bump 🌱"
          pr-labels: |
            dependencies
            automated
